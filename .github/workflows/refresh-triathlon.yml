name: Refresh triathlon events

on:
  schedule:
    # Run every Monday at 04:00 UTC
    - cron: "0 4 * * 1"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Fetch & commit triathlon events
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Fetch triathlon events
        run: bun run fetch-triathlon

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/triathlon-events.json
          if git diff --cached --quiet; then
            echo "No changes to triathlon events, skipping commit."
          else
            git commit -m "chore: refresh triathlon events [$(date -u +%Y-%m-%d)]"
            git push
          fi
